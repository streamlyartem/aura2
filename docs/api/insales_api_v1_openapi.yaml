openapi: 3.1.0
info:
  title: AURA InSales API v1
  version: 1.0.0
servers:
  - url: /api/v1/insales
paths:
  /products/{external_id}:
    get:
      summary: Product snapshot by external_id or sku
      parameters:
        - in: path
          name: external_id
          required: true
          schema: { type: string }
        - in: query
          name: by
          schema: { type: string, enum: [external_id, sku] }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
    delete:
      summary: Soft delete (outbox tombstone)
      responses:
        '200': { description: Deleted }
  /products/changes:
    get:
      summary: Incremental changes feed
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500 }
        - in: query
          name: include_deleted
          schema: { type: boolean }
      responses:
        '200': { description: OK }
  /sync/upsert:
    post:
      summary: Async idempotent bulk upsert
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      responses:
        '202': { description: Accepted }
        '409': { description: Idempotency conflict }
  /sync/full:
    post:
      summary: Async full sync to outbox
      responses:
        '202': { description: Accepted }
  /sync/runs/{run_id}:
    get:
      summary: Run status
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
